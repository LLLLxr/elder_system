# ======================================================
# API Gateway - Production Environment Configuration
# All values MUST be injected via OS environment variables
# Never commit real secrets to version control
# ======================================================
# Required environment variables:
#   SERVER_PORT           - Server port (e.g. 8080)
#   JWT_SECRET            - JWT signing secret (>= 32 chars)
#   IAM_SERVICE_URL       - IAM aggregate service base URL (e.g. http://iam-svc:8082)
#   OPS_SERVICE_URL       - Ops aggregate service base URL (e.g. http://ops-svc:8083)
#   CARE_CORE_SERVICE_URL - Care-core aggregate service base URL (e.g. http://care-core-svc:8090)
#
# ======================================================

server:
  port: ${SERVER_PORT}

jwt:
  secret: ${JWT_SECRET}

auth:
  whitelist:
    paths:
      - /auth/login
      - /auth/validate
      - /auth/user-info
      - /nacos/

services:
  iam:
    url: ${IAM_SERVICE_URL}
  care-core:
    url: ${CARE_CORE_SERVICE_URL}
  ops:
    url: ${OPS_SERVICE_URL}


