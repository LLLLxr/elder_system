spring:
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
    gateway:
      routes:
        - id: iam-auth-route
          uri: ${services.iam.url}
          predicates:
            - Path=/auth/**
        - id: iam-api-auth-route
          uri: ${services.iam.url}
          predicates:
            - Path=/api/auth/**
        - id: iam-api-users-route
          uri: ${services.iam.url}
          predicates:
            - Path=/api/users/**
        - id: iam-api-roles-route
          uri: ${services.iam.url}
          predicates:
            - Path=/api/roles/**
        - id: iam-api-permissions-route
          uri: ${services.iam.url}
          predicates:
            - Path=/api/permissions/**
        - id: iam-user-route
          uri: ${services.iam.url}
          predicates:
            - Path=/user-service/**
        - id: ops-business-route
          uri: ${services.ops.url}
          predicates:
            - Path=/business/**
        - id: care-core-orchestration-route
          uri: ${services.care-core.url}
          predicates:
            - Path=/care-orchestration/**
        - id: care-core-admission-route
          uri: ${services.care-core.url}
          predicates:
            - Path=/admission/**
        - id: care-core-contract-route
          uri: ${services.care-core.url}
          predicates:
            - Path=/contract/**
        - id: care-core-health-route
          uri: ${services.care-core.url}
          predicates:
            - Path=/health/**
        - id: care-core-delivery-route
          uri: ${services.care-core.url}
          predicates:
            - Path=/care-delivery/**
        - id: care-core-quality-route
          uri: ${services.care-core.url}
          predicates:
            - Path=/quality/**
        - id: ops-billing-route
          uri: ${services.ops.url}
          predicates:
            - Path=/billing/**
        - id: ops-resource-route
          uri: ${services.ops.url}
          predicates:
            - Path=/resource-scheduling/**
        - id: ops-safety-route
          uri: ${services.ops.url}
          predicates:
            - Path=/safety-emergency/**


server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET}

auth:
  whitelist:
    paths:
      - /auth/login
      - /auth/validate
      - /auth/user-info
      - /nacos/

services:
  iam:
    url: ${IAM_SERVICE_URL:http://localhost:8082}
  care-core:
    url: ${CARE_CORE_SERVICE_URL:http://localhost:8090}
  ops:
    url: ${OPS_SERVICE_URL:http://localhost:8083}


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics