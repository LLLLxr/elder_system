# ======================================================
# Docker Compose - Development Environment
# Usage: docker-compose up --build
# ======================================================
services:
  iam-service:
    build:
      context: ./iam-service
      dockerfile: Dockerfile
      args:
        JAR_FILE: target/*.jar
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8082
      APP_REDIS_ENABLED: false
      USER_LOGIN_PATH: /api/auth/login
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  care-core-service:
    build:
      context: ./care-core-service
      dockerfile: Dockerfile
      args:
        JAR_FILE: target/*.jar
    ports:
      - "8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8090
      ADMISSION_SERVICE_URL: http://care-core-service:8090
      CONTRACT_SERVICE_URL: http://care-core-service:8090
      CARE_DELIVERY_SERVICE_URL: http://care-core-service:8090
      HEALTH_SERVICE_URL: http://care-core-service:8090
      QUALITY_SERVICE_URL: http://care-core-service:8090
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  ops-service:
    build:
      context: ./ops-service
      dockerfile: Dockerfile
      args:
        JAR_FILE: target/*.jar
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8083
      IAM_SERVICE_URL: http://iam-service:8082
    depends_on:
      iam-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
      args:
        JAR_FILE: target/*.jar
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      IAM_SERVICE_URL: http://iam-service:8082
      OPS_SERVICE_URL: http://ops-service:8083
      CARE_CORE_SERVICE_URL: http://care-core-service:8090
    depends_on:
      iam-service:
        condition: service_healthy
      care-core-service:
        condition: service_healthy
      ops-service:
        condition: service_healthy

  smart-nursing-home-demo:
    build:
      context: ./smart-nursing-home-demo
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      api-gateway:
        condition: service_started

  smart-nursing-home-service-portal:
    build:
      context: ./smart-nursing-home-service-portal
      dockerfile: Dockerfile
    ports:
      - "5174:80"
    depends_on:
      api-gateway:
        condition: service_started

