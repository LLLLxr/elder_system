# ======================================================
# API Gateway - Development Environment Configuration
# ======================================================

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:mySecureSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong}

auth:
  whitelist:
    paths:
      - /auth/login
      - /auth/validate
      - /auth/user-info
      - /nacos/

services:
  iam:
    url: http://localhost:8082
  care-core:
    url: http://localhost:8090
  ops:
    url: http://localhost:8083


