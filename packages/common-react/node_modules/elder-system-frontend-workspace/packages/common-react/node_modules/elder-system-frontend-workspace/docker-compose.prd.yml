# ======================================================
# Docker Compose - Production Environment
# Usage:
#   1. cp .env.example .env.prd  (fill in real values)
#   2. docker-compose -f docker-compose.prd.yml --env-file .env.prd up -d
#
# Production convergence target: iam-service + care-core-service + ops-service + api-gateway
#
# Required variables (see .env.example):
#   DOCKER_REGISTRY, IMAGE_TAG,
#   JWT_SECRET, APP_ADMIN_PASSWORD, APP_USER_PASSWORD
#   IAM_HOST_PORT, CARE_CORE_HOST_PORT, OPS_HOST_PORT, GATEWAY_HOST_PORT
# ======================================================
services:
  iam-service:
    image: ${DOCKER_REGISTRY:-localhost}/iam-service:${IMAGE_TAG:-latest}
    ports:
      - "${IAM_HOST_PORT:-8082}:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prd
      SERVER_PORT: 8082
      APP_REDIS_ENABLED: ${APP_REDIS_ENABLED:-false}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1800}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD}
      USER_LOGIN_PATH: /api/auth/login
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  care-core-service:
    image: ${DOCKER_REGISTRY:-localhost}/care-core-service:${IMAGE_TAG:-latest}
    ports:
      - "${CARE_CORE_HOST_PORT:-8090}:8090"
    environment:
      SPRING_PROFILES_ACTIVE: prd
      SERVER_PORT: 8090
      ADMISSION_SERVICE_URL: http://care-core-service:8090
      CONTRACT_SERVICE_URL: http://care-core-service:8090
      CARE_DELIVERY_SERVICE_URL: http://care-core-service:8090
      HEALTH_SERVICE_URL: http://care-core-service:8090
      QUALITY_SERVICE_URL: http://care-core-service:8090
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  ops-service:
    image: ${DOCKER_REGISTRY:-localhost}/ops-service:${IMAGE_TAG:-latest}
    ports:
      - "${OPS_HOST_PORT:-8083}:8083"
    environment:
      SPRING_PROFILES_ACTIVE: prd
      SERVER_PORT: 8083
      IAM_SERVICE_URL: http://iam-service:8082
    depends_on:
      iam-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  api-gateway:
    image: ${DOCKER_REGISTRY:-localhost}/api-gateway:${IMAGE_TAG:-latest}
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prd
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET}
      IAM_SERVICE_URL: http://iam-service:8082
      OPS_SERVICE_URL: http://ops-service:8083
      CARE_CORE_SERVICE_URL: http://care-core-service:8090
    depends_on:
      iam-service:
        condition: service_healthy
      care-core-service:
        condition: service_healthy
      ops-service:
        condition: service_healthy
    restart: unless-stopped

  smart-nursing-home-demo:
    image: ${DOCKER_REGISTRY:-localhost}/smart-nursing-home-demo:${IMAGE_TAG:-latest}
    ports:
      - "${ADMIN_FE_HOST_PORT:-5173}:80"
    depends_on:
      api-gateway:
        condition: service_started
    restart: unless-stopped

  smart-nursing-home-service-portal:
    image: ${DOCKER_REGISTRY:-localhost}/smart-nursing-home-service-portal:${IMAGE_TAG:-latest}
    ports:
      - "${SERVICE_PORTAL_HOST_PORT:-5174}:80"
    depends_on:
      api-gateway:
        condition: service_started
    restart: unless-stopped

