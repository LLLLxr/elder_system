# ======================================================
# Business Service - Production Environment Configuration
# All values MUST be injected via OS environment variables
# Never commit real secrets to version control
# ======================================================
# Required environment variables:
#   SERVER_PORT        - Server port (e.g. 8083)
#   AUTH_SERVICE_URL   - Auth service base URL (e.g. http://auth-svc:8082)
# ======================================================

server:
  port: ${SERVER_PORT}

services:
  auth:
    url: ${AUTH_SERVICE_URL}

