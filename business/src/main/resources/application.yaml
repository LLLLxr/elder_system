spring:
  application:
    name: business
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      config:
        import-check:
          enabled: false

server:
  port: ${SERVER_PORT:8083}

services:
  auth:
    url: ${AUTH_SERVICE_URL:http://localhost:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics