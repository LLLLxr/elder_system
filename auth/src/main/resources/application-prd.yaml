# ======================================================
# Auth Service - Production Environment Configuration
# All values MUST be injected via OS environment variables
# Never commit real secrets to version control
# ======================================================
# Required environment variables:
#   SERVER_PORT          - Server port (e.g. 8082)
#   JWT_SECRET           - JWT signing secret (>= 32 chars)
#   JWT_EXPIRATION       - Token TTL in seconds (e.g. 86400)
#   APP_ADMIN_PASSWORD   - Admin account password
#   APP_USER_PASSWORD    - User account password
# ======================================================

server:
  port: ${SERVER_PORT}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400}

app:
  users:
    admin:
      password: ${APP_ADMIN_PASSWORD}
    user:
      password: ${APP_USER_PASSWORD}

