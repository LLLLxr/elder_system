spring:
  config:
    activate:
      on-profile: dev
  
  # Development Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/elder_system_dev?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8
    username: root
    password: password
  
  # Development Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

  # JPA Configuration for Development
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# Development Logging
logging:
  level:
    org.smart_elder_system.user.mapper: DEBUG
    org.smart_elder_system.user.service.impl: DEBUG
    org.springframework.security: DEBUG

# Development Configuration
app:
  user:
    auth:
      # Enable third-party service mock for development
      use-mock-services: true
      # Mock verification result
      mock-verify-success: true