spring:
  application:
    name: care-core-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
  datasource:
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    url: ${DB_URL:jdbc:h2:mem:care_core_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  sql:
    init:
      mode: ${SQL_INIT_MODE:embedded}
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console

server:
  port: ${SERVER_PORT:8090}

services:
  care-core:
    url: ${CARE_CORE_SERVICE_URL:http://localhost:8090}
  admission:
    url: ${services.care-core.url}
  contract:
    url: ${services.care-core.url}
  care-delivery:
    url: ${services.care-core.url}
  health:
    url: ${services.care-core.url}
  quality:
    url: ${services.care-core.url}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
